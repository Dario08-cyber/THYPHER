<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thypher</title>

  <!-- Tipografía minimalista -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <!-- AQUÍ PEGARÁS EL CÓDIGO DE GOOGLE ADSENSE -->
</head>
<body>

  <main class="contenedor">

    <header class="cabecera">
      <span class="etiqueta">Math & Physics puzzle</span>
      <h1>THYPHER</h1>
      <p class="descripcion">
        Decipher the equations and discover the hidden word.
      </p>
    </header>

    <section class="panel-juego">
      <div id="ecuaciones"></div>

      <div class="zona-respuesta">
        <input
          type="text"
          id="entrada"
          placeholder="ESCRIBE LA PALABRA"
          autocomplete="off"
        >

        <button id="probar">Find out</button>
      </div>

      <p id="resultado"></p>
    </section>

    <!-- ZONA DE PUBLICIDAD -->
    <section class="anuncio">
      <!--
      Cuando Google AdSense te apruebe, pega aquí el bloque del anuncio.
      -->
      <p class="anuncio-texto">Espacio reservado para publicidad</p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
