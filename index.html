<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Thypher | Math & Physics Puzzle Quiz</title>

  <meta name="description"
    content="Play Thypher, the math and physics puzzle quiz where you decipher equations and discover hidden words.">

  <meta name="robots" content="index, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <!-- CONFETTI -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</head>

<body>

  <main class="contenedor">

    <header class="cabecera">

      <span class="etiqueta">
        Math & Physics puzzle
      </span>

      <h1>THYPHER</h1>

      <p class="descripcion">
        Decipher the equations and discover the hidden word.
      </p>

    </header>

    <section class="panel-juego">

      <!-- ECUACIONES -->
      <div id="ecuaciones"></div>

      <!-- INPUT DE RESPUESTA -->
      <div class="zona-respuesta">

        <input
          type="text"
          id="entrada"
          placeholder="WRITE THE WORD"
          autocomplete="off"
        >

        <button id="probar">
          Find out
        </button>

      </div>

      <!-- RESULTADO -->
      <p id="resultado"></p>

    </section>

  </main>

  <script src="script.js"></script>

</body>

</html>
